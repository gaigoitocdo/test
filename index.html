<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra tích hợp Tawk.to</title>
</head>
<body>
    <h1>Kiểm tra tích hợp Tawk.to</h1>

    <!--Start of Tawk.to Script-->
    <script type="text/javascript">
        var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();
        (function() {
            var s1 = document.createElement("script"),
                s0 = document.getElementsByTagName("script")[0];
            s1.async = true;
            s1.src = 'https://embed.tawk.to/675afd2aaf5bfec1dbdb07af/1ietmps0a';  <!-- Thay mã ID của bạn -->
            s1.charset = 'UTF-8';
            s1.setAttribute('crossorigin', '*');
            s0.parentNode.insertBefore(s1, s0);
        })();
    </script>
    <!--End of Tawk.to Script-->

    <!-- JavaScript để thay đổi avatar -->
    <script type="text/javascript">
        Tawk_API.onLoad = function() {
            // Thay đổi Avatar của nhân viên
            Tawk_API.setAttributes({
                'name': 'Thu Trang',  // Đặt tên của nhân viên hỗ trợ
                'avatar': 'https://i.ibb.co/W6y4q0g/461048236-1070808604391711-8132402547166610401-n.jpg'  // Đường dẫn đến ảnh avatar mới
            });
        };
    </script>

</body>
</html>
